name: bloc_de_notas
description: "A Blog de notas Flutter project."
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  reorderable_grid_view: ^2.2.8
  share_plus: ^12.0.1
  image_picker: ^1.2.1
  flutter_quill: ^11.5.0
  flutter_quill_extensions: ^11.0.0
  path_provider: ^2.1.5
  provider: ^6.1.5+1
  dynamic_color: ^1.8.1
  flutter_tts: ^4.2.5
  shared_preferences: ^2.5.4
  google_fonts: ^8.0.2
  font_awesome_flutter: ^11.0.0
  url_launcher: ^6.3.2
  flutter_launcher_icons: ^0.14.4
  package_info_plus: ^9.0.0
  pdf: ^3.12.0
  markdown_quill: ^4.3.0
  flutter_quill_to_pdf: ^2.3.9
  vsc_quill_delta_to_html: ^1.0.5
  rename_app: 1.6.5
  http: ^1.2.0
  flutter_markdown_plus: ^1.0.7
  quill_native_bridge: ^11.1.0
  video_player: ^2.11.1
  audioplayers: ^5.2.1
  file_picker: ^8.0.0       # Para seleccionar archivos
  record: ^5.0.0            # Para grabar audio de forma nativa
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/notas.png"
  # Opcional: para iconos adaptativos de Android
  adaptive_icon_background: "#FFFFFF" 
  adaptive_icon_foreground: "assets/icon/notas.png"
  # Configuración para Web
  web:
    generate: true
    image_path: "assets/icon/notas.png"